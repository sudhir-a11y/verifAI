<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Auditor QC Review</title>
  <link rel="stylesheet" href="/qc/public/app.css?v=20260348">
  <style>
    body { margin: 0; font-family: "Outfit", "Segoe UI", Arial, sans-serif; background: #eef3f8; color: #1f2f46; overflow: hidden; }
    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 12px 16px; background: #ffffff; border-bottom: 1px solid #d8e2ef; position: sticky; top: 0; z-index: 10; }
    .topbar h2 { margin: 0; font-size: 20px; }
    .topbar .meta { color: #4d6485; font-size: 13px; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .actions button { border: 1px solid #2b64a7; background: #2b64a7; color: #fff; border-radius: 8px; padding: 8px 12px; font-weight: 600; cursor: pointer; }
    .actions button.soft { background: #fff; color: #2b64a7; }
    .actions button:disabled { opacity: 0.6; cursor: not-allowed; }
    #qc-msg { margin: 0; padding: 8px 16px; min-height: 20px; }
    .layout {
      --left-pane-width: 52%;
      display: grid;
      grid-template-columns: minmax(320px, var(--left-pane-width)) 10px minmax(420px, 1fr);
      gap: 10px;
      padding: 12px;
      height: calc(100vh - 120px);
      box-sizing: border-box;
      align-items: stretch;
    }
    .splitter {
      width: 10px;
      border-radius: 8px;
      background: linear-gradient(180deg, #d7e5f5, #c9dcee);
      border: 1px solid #b8cde3;
      cursor: col-resize;
      user-select: none;
      touch-action: none;
      align-self: stretch;
      position: relative;
    }
    .splitter::before {
      content: '';
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 2px;
      height: 36px;
      border-radius: 2px;
      background: #6f8db2;
      box-shadow: 0 -8px 0 #6f8db2, 0 8px 0 #6f8db2;
    }
    .splitter:hover,
    .splitter.dragging {
      background: linear-gradient(180deg, #c6ddf4, #b4cfe8);
      border-color: #8fb4db;
    }
    body.qc-resizing,
    body.qc-resizing * {
      cursor: col-resize !important;
      user-select: none !important;
    }
    .panel { background: #fff; border: 1px solid #d8e2ef; border-radius: 12px; display: flex; flex-direction: column; min-height: 0; }
    .panel-head { padding: 10px 12px; border-bottom: 1px solid #e5ecf5; font-weight: 700; display: flex; justify-content: space-between; align-items: center; }
    .panel-body { padding: 10px; min-height: 0; overflow: hidden; }
    .panel-body.report-pane { display: grid; grid-template-rows: auto 1fr; gap: 10px; }
    .conclusion-box { border: 1px solid #d8e2ef; border-radius: 10px; background: #f8fbff; padding: 10px; display: grid; gap: 8px; }
    .conclusion-box-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .conclusion-box-head span { font-size: 13px; font-weight: 700; color: #2a456b; }
    .conclusion-box-head button { border: 1px solid #2b64a7; background: #fff; color: #1f2f46; border-radius: 8px; padding: 6px 10px; font-weight: 600; cursor: pointer; }
    #qc-conclusion-only { width: 100%; min-height: 104px; resize: vertical; border: 1px solid #c7d6e8; border-radius: 8px; padding: 8px 10px; font-family: "Outfit", "Segoe UI", Arial, sans-serif; font-size: 14px; color: #1f2f46; background: #fff; }
    #qc-conclusion-only:focus { outline: 2px solid #9ec3f3; outline-offset: 0; }
    #report-editor { height: 100%; overflow: auto; border: 1px solid #d6dfeb; border-radius: 10px; padding: 12px; background: #fff; }
    #report-editor:focus { outline: 2px solid #9ec3f3; outline-offset: 0; }

    .docs-wrap { display: grid; grid-template-rows: auto auto 1fr; gap: 8px; height: 100%; }
    .doc-select-row { display: grid; grid-template-columns: minmax(0, 1fr) auto auto auto; gap: 8px; align-items: center; }
    #doc-select {
      width: 100%;
      min-width: 0;
      padding: 8px 10px;
      border: 1px solid #b4c6de;
      border-radius: 8px;
      background: #fff;
      color: #1f2f46;
      font-size: 14px;
    }
    .doc-select-row button {
      border: 1px solid #b4c6de;
      background: #fff;
      color: #24558f;
      border-radius: 8px;
      padding: 7px 10px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      min-width: 72px;
      white-space: nowrap;
    }
    #doc-selected-name {
      color: #587296;
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #doc-preview-container { width: 100%; height: 100%; border: 1px solid #d6dfeb; border-radius: 10px; background: #fff; overflow: hidden; }
    #doc-preview { width: 100%; height: 100%; border: 0; background: #fff; }
    #doc-preview-container:fullscreen { border-radius: 0; border: 0; background: #0b1220; }
    #doc-preview-container:fullscreen #doc-preview { width: 100vw; height: 100vh; }
    .muted-small { color: #587296; font-size: 12px; }

    @media (max-width: 1100px) {
      .layout { grid-template-columns: 1fr; height: auto; }
      .splitter { display: none; }
      .panel { min-height: 420px; }
      .doc-select-row { grid-template-columns: 1fr 1fr 1fr 1fr; }
      .doc-select-row button { min-width: 0; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div>
      <h2>Auditor QC Review</h2>
      <div class="meta" id="qc-claim-meta">Claim: -</div>
    </div>
    <div class="actions">
      <button type="button" class="soft" id="qc-reload-btn">Reload</button>
      <button type="button" class="soft" id="qc-send-back-btn">Send Back</button>
      <button type="button" class="soft" id="qc-run-rules-btn">Run Rules Again</button>
      <button type="button" class="soft" id="qc-generate-conclusion-btn">Generate Conclusion Only</button>
      <button type="button" id="qc-save-btn">Save HTML</button>
      <button type="button" id="qc-save-mark-btn">Save + Mark QC Done</button>
    </div>
  </header>
  <p id="qc-msg"></p>
  <main class="layout" id="qc-layout">
    <section class="panel">
      <div class="panel-head">
        <span>Doctor HTML</span>
        <span class="muted-small" id="qc-report-source">source: doctor</span>
      </div>
      <div class="panel-body report-pane">
        <div class="conclusion-box">
          <div class="conclusion-box-head">
            <span>Conclusion Only</span>
            <button type="button" id="qc-apply-conclusion-btn">Apply To Report</button>
          </div>
          <textarea id="qc-conclusion-only" placeholder="Run rules again or generate conclusion only..."></textarea>
        </div>
        <div id="report-editor" contenteditable="true"></div>
      </div>
    </section>
    <div id="qc-splitter" class="splitter" role="separator" aria-label="Resize panels" aria-orientation="vertical" tabindex="0"></div>
    <aside class="panel">
      <div class="panel-head">
        <span>Documents</span>
        <span class="muted-small" id="qc-doc-count">0</span>
      </div>
      <div class="panel-body docs-wrap">
        <div class="doc-select-row">
          <select id="doc-select">
            <option value="">Select document</option>
          </select>
          <button type="button" id="doc-preview-btn">Preview</button>
          <button type="button" id="doc-open-btn">Open</button>
          <button type="button" id="doc-fullscreen-btn">Full Screen</button>
        </div>
        <div class="muted-small" id="doc-selected-name">No document selected.</div>
        <div id="doc-preview-container"><iframe id="doc-preview" title="Document Preview"></iframe></div>
      </div>
    </aside>
  </main>
  <script src="/qc/public/auditor-qc.js?v=20260362"></script>
</body>
</html>
