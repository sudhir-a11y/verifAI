<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>VeriAI Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/QC-BKP/public/app.css?v=20260226">
  <style>
    body.login-page {
      min-height: 100vh;
      margin: 0;
      padding: 16px;
      display: grid;
      place-items: center;
      font-family: "Outfit", "Trebuchet MS", "Century Gothic", sans-serif;
      background:
        linear-gradient(135deg, rgba(5, 24, 51, 0.78), rgba(4, 27, 58, 0.86)),
        url('/QC-BKP/public/assets/login-bg-veeriai.jpg') center center / cover no-repeat fixed;
    }

    .login-card {
      width: min(780px, 96vw);
      border-radius: 32px;
      border: 1px solid rgba(136, 207, 248, 0.33);
      background:
        linear-gradient(155deg, rgba(4, 24, 53, 0.95), rgba(2, 17, 43, 0.97)),
        radial-gradient(circle at 50% 112%, rgba(118, 187, 245, 0.25), transparent 52%);
      box-shadow: 0 36px 70px rgba(1, 8, 26, 0.58);
      padding: clamp(26px, 3vw, 44px);
      color: #e7f5ff;
      backdrop-filter: blur(3px);
    }

    .login-brand {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 24px;
    }

    .brand-avatar {
      width: 66px;
      height: 66px;
      border-radius: 18px;
      border: 1px solid rgba(140, 216, 255, 0.58);
      background:
        radial-gradient(circle at 30% 28%, #daf7ff, #a0defe 48%, #4ca7de 84%),
        linear-gradient(180deg, #8fe2ff, #3f96d0);
      box-shadow: 0 12px 28px rgba(92, 181, 234, 0.35);
      position: relative;
      flex-shrink: 0;
    }

    .brand-avatar::before,
    .brand-avatar::after {
      content: "";
      position: absolute;
      width: 10px;
      height: 10px;
      top: 23px;
      border-radius: 50%;
      background: #0d3251;
      box-shadow: 0 0 0 2px rgba(173, 232, 255, 0.42);
    }

    .brand-avatar::before {
      left: 17px;
    }

    .brand-avatar::after {
      right: 17px;
    }

    .login-brand h2 {
      margin: 0;
      font-size: clamp(1.9rem, 2vw, 2.35rem);
      color: #edf8ff;
      line-height: 1.05;
      letter-spacing: 0.01em;
    }

    .login-brand p {
      margin: 6px 0 0;
      color: #9fbad1;
      font-size: clamp(1.04rem, 1.1vw, 1.14rem);
      font-weight: 500;
    }

    .login-error {
      margin: 10px 0 16px;
      border: 1px solid rgba(255, 145, 145, 0.5);
      background: rgba(134, 31, 40, 0.4);
      color: #ffd5d5;
      border-radius: 12px;
      padding: 11px 14px;
      font-weight: 600;
      font-size: 0.96rem;
    }

    .login-field {
      margin-bottom: 18px;
    }

    .login-field label {
      display: inline-block;
      margin-bottom: 10px;
      color: #c5def0;
      letter-spacing: 0.01em;
      font-weight: 700;
      font-size: clamp(1.04rem, 1.2vw, 1.14rem);
    }

    .login-field input {
      width: 100%;
      border-radius: 18px;
      border: 1px solid rgba(93, 162, 209, 0.56);
      background: rgba(18, 48, 82, 0.74);
      color: #ebf7ff;
      padding: 17px 19px;
      font-size: clamp(1.12rem, 1.2vw, 1.25rem);
      box-shadow: inset 0 0 0 1px rgba(183, 229, 255, 0.08);
    }

    .login-field input::placeholder {
      color: #9ab6cb;
    }

    .login-field input:focus {
      outline: none;
      border-color: #8fdcff;
      box-shadow: 0 0 0 3px rgba(88, 194, 245, 0.22);
      background: rgba(17, 50, 86, 0.82);
    }

    .login-submit {
      width: 100%;
      margin-top: 12px;
      border-radius: 18px;
      border: 1px solid rgba(149, 230, 255, 0.62);
      padding: 17px 16px;
      background: linear-gradient(90deg, #4da4df, #79d5e9);
      color: #072742;
      font-size: clamp(1.1rem, 1.25vw, 1.3rem);
      font-weight: 800;
      letter-spacing: 0.02em;
      box-shadow: 0 16px 30px rgba(38, 154, 214, 0.35);
      cursor: pointer;
      transition: filter 0.15s ease, transform 0.15s ease;
    }

    .login-submit:hover {
      filter: brightness(1.04);
      transform: translateY(-1px);
    }

    .login-meta {
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      color: #9ab7cd;
      font-size: clamp(1rem, 1.1vw, 1.1rem);
      font-weight: 500;
    }

    .login-meta a {
      color: #ace5ff;
      text-decoration: none;
      font-weight: 700;
    }

    .login-meta a:hover {
      text-decoration: underline;
    }

    @media (max-width: 720px) {
      .login-card {
        border-radius: 24px;
        padding: 22px 20px;
      }

      .login-brand {
        gap: 12px;
      }

      .brand-avatar {
        width: 56px;
        height: 56px;
      }

      .brand-avatar::before,
      .brand-avatar::after {
        width: 8px;
        height: 8px;
        top: 20px;
      }

      .brand-avatar::before {
        left: 14px;
      }

      .brand-avatar::after {
        right: 14px;
      }

      .login-meta {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body class="app-body login-page">
<main class="login-card">
  <div class="login-brand">
    <div class="brand-avatar" aria-hidden="true"></div>
    <div>
      <h2>VerifAI</h2>
      <p>Continue to your role-based dashboard</p>
    </div>
  </div>
    <form method="post" autocomplete="off">
    <input type="hidden" name="csrf_token" value="cc58a52aa0881f91cc092aa6de46b39d1522a8a7f9f306c4c56d1e0653c9e856">
    <div class="login-field">
      <label for="username">Username</label>
      <input id="username" type="text" name="username" placeholder="Enter your username" required>
    </div>
    <div class="login-field">
      <label for="password">Password</label>
      <input id="password" type="password" name="password" placeholder="Enter your password" required>
    </div>
    <button class="login-submit" type="submit">Access Dashboard</button>
  </form>
  <div class="login-meta">
    <span>Protected by role and session controls.</span>
    <a href="/QC-BKP/index.php">Back to home</a>
  </div>
</main>
</body>
</html>
